<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予防接種スケジュール</title>
  
  <!-- Tailwind CSSの読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babelの読み込み（ブラウザでReactを動かすため） -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- モジュールのインポート設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Reactアプリケーションのコード -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, CheckSquare, Square, AlertCircle, Info, Users, Copy, Check, ArrowRight, Baby } from 'lucide-react';

    // Firebaseの初期化（クラウド保存用）
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';

    // ★★★ Vercelでクラウド共有を使う場合は、ここにFirebaseの設定を貼り付けます ★★★
    const myFirebaseConfig = {
      // apiKey: "YOUR_API_KEY",
      // authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      // projectId: "YOUR_PROJECT_ID",
      // storageBucket: "YOUR_PROJECT_ID.appspot.com",
      // messagingSenderId: "YOUR_SENDER_ID",
      // appId: "YOUR_APP_ID"
    };

    let app, auth, db, appId = 'vaccine-schedule-app';
    
    try {
      if (typeof __firebase_config !== 'undefined') {
        // AIプレビュー環境用の設定
        const firebaseConfig = JSON.parse(__firebase_config);
        app = initializeApp(firebaseConfig);
        appId = typeof __app_id !== 'undefined' ? __app_id : appId;
      } else if (Object.keys(myFirebaseConfig).length > 0) {
        // Vercel本番環境用の設定
        app = initializeApp(myFirebaseConfig);
      }

      if (app) {
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (error) {
      console.error("Firebase initialization error:", error);
    }

    // 初期データの設定
    const initialProfile = {
      name: '朔玖',
      birthDate: '2026-04-01'
    };

    const initialTodos = [
      { id: 1, text: '肺炎球菌（1回目と2回目申請）', completed: false },
      { id: 2, text: '5種混合Ⅰ期（1回目と2回目申請）', completed: false },
      { id: 3, text: 'B型肝炎（1回目と2回目申請）', completed: false },
      { id: 4, text: 'ロタウイルス（1回目と2回目申請）', completed: false },
    ];

    const initialVaccines = [
      {
        id: 1,
        name: '小児用肺炎球菌',
        theme: 'bg-pink-50 border-pink-200 text-pink-800',
        doses: [
          { id: '1-1', label: '1回目', date: '2026-06-15', status: '完了', note: '' },
          { id: '1-2', label: '2回目', date: '2026-07-14', status: '予定', note: '1回目から27日以上あける' },
          { id: '1-3', label: '3回目', date: '2026-08-12', status: '予定', note: '8/10以降。もう1週間＋するか？' },
        ],
      },
      {
        id: 2,
        name: 'B型肝炎',
        theme: 'bg-blue-50 border-blue-200 text-blue-800',
        doses: [
          { id: '2-1', label: '1回目', date: '2026-06-15', status: '完了', note: '' },
          { id: '2-2', label: '2回目', date: '2026-07-14', status: '予定', note: '1回目から27日以上あける' },
          { id: '2-3', label: '3回目', date: '', status: '未定', note: '1回目から139日以上あける（横浜で）' },
        ],
      },
      {
        id: 3,
        name: 'ロタウイルス（5価）',
        theme: 'bg-green-50 border-green-200 text-green-800',
        doses: [
          { id: '3-1', label: '1回目', date: '2026-06-15', status: '完了', note: '' },
          { id: '3-2', label: '2回目', date: '2026-07-14', status: '予定', note: '1回目から27日以上あける' },
          { id: '3-3', label: '3回目', date: '2026-08-12', status: '予定', note: '出生32週までに（横浜で）。8/10以降' },
        ],
      },
      {
        id: 4,
        name: '五種混合',
        theme: 'bg-yellow-50 border-yellow-200 text-yellow-800',
        doses: [
          { id: '4-1', label: '1回目', date: '2026-06-15', status: '完了', note: '' },
          { id: '4-2', label: '2回目', date: '2026-07-14', status: '予定', note: '1回目から27日以上あける' },
          { id: '4-3', label: '3回目', date: '2026-08-12', status: '予定', note: '2回目から27日以上あける' },
        ],
      },
      {
        id: 5,
        name: 'BCG',
        theme: 'bg-purple-50 border-purple-200 text-purple-800',
        doses: [
          { id: '5-1', label: '1回目', date: '', status: '未定', note: '生後5ヶ月〜8ヶ月のあいだ（横浜）で' },
        ],
      },
    ];

    // 月齢・生後日数の計算ロジック
    const getAgeText = (birthStr, targetStr) => {
      if (!birthStr || !targetStr) return '';
      const birth = new Date(birthStr);
      const target = new Date(targetStr);
      if (isNaN(birth.getTime()) || isNaN(target.getTime())) return '';
      if (target < birth) return '生まれる前';

      const utcBirth = Date.UTC(birth.getFullYear(), birth.getMonth(), birth.getDate());
      const utcTarget = Date.UTC(target.getFullYear(), target.getMonth(), target.getDate());
      const diffDays = Math.floor((utcTarget - utcBirth) / (1000 * 60 * 60 * 24));
      
      const weeks = Math.floor(diffDays / 7);
      const days = diffDays % 7;

      let years = target.getFullYear() - birth.getFullYear();
      let months = target.getMonth() - birth.getMonth();
      if (target.getDate() < birth.getDate()) {
        months--;
      }
      if (months < 0) {
        years--;
        months += 12;
      }

      return `${years}歳${months}ヶ月 (生後${weeks}週${days}日)`;
    };


    function App() {
      const [profile, setProfile] = useState(initialProfile);
      const [todos, setTodos] = useState(initialTodos);
      const [vaccines, setVaccines] = useState(initialVaccines);
      
      const [user, setUser] = useState(null);
      const [shareCode, setShareCode] = useState(''); 
      const [inputCode, setInputCode] = useState(''); 
      const [isCopied, setIsCopied] = useState(false);
      const [showShareMenu, setShowShareMenu] = useState(false);
      const [isLoading, setIsLoading] = useState(!!auth); // Authがあればローディング

      // 1. Firebase 認証の初期化
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser && !shareCode) {
            setShareCode(currentUser.uid);
          }
        });
        return () => unsubscribe();
      }, []);

      // 2. クラウドデータとの同期
      useEffect(() => {
        if (!user || !shareCode || !db) return;
        setIsLoading(true);
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', shareCode);
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.profile) setProfile(data.profile);
            if (data.todos) setTodos(data.todos);
            if (data.vaccines) setVaccines(data.vaccines);
          } else if (shareCode === user.uid) {
            setDoc(docRef, { profile: initialProfile, todos: initialTodos, vaccines: initialVaccines }, { merge: true });
          }
          setIsLoading(false);
        }, (error) => {
          console.error("Firestore sync error:", error);
          setIsLoading(false);
        });
        return () => unsubscribe();
      }, [user, shareCode]);

      // クラウドへのデータ保存
      const saveToCloud = async (newProfile, newTodos, newVaccines) => {
        if (!user || !shareCode || !db) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', shareCode);
          await setDoc(docRef, { 
            profile: newProfile || profile,
            todos: newTodos || todos, 
            vaccines: newVaccines || vaccines 
          }, { merge: true });
        } catch (error) {
          console.error("Save error:", error);
        }
      };

      const handleProfileChange = (field, value) => {
        const newProfile = { ...profile, [field]: value };
        setProfile(newProfile);
        saveToCloud(newProfile, null, null);
      };

      const toggleTodo = (id) => {
        const newTodos = todos.map((todo) =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo
        );
        setTodos(newTodos);
        saveToCloud(null, newTodos, null);
      };

      const handleDoseChange = (vaccineId, doseId, field, value) => {
        const newVaccines = vaccines.map((v) => {
          if (v.id === vaccineId) {
            return {
              ...v,
              doses: v.doses.map((d) =>
                d.id === doseId ? { ...d, [field]: value } : d
              ),
            };
          }
          return v;
        });
        setVaccines(newVaccines);
        saveToCloud(null, null, newVaccines);
      };

      const applyShareCode = () => {
        if (inputCode.trim() !== '') {
          setShareCode(inputCode.trim());
          setInputCode('');
          setShowShareMenu(false);
        }
      };

      const resetToMyCode = () => {
        if (user) {
          setShareCode(user.uid);
          setShowShareMenu(false);
        }
      };

      const handleCopyCode = () => {
        if (!user) return;
        const textArea = document.createElement("textarea");
        textArea.value = user.uid;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2000);
        } catch (err) {}
        document.body.removeChild(textArea);
      };

      const getStatusColor = (status) => {
        switch (status) {
          case '完了': return 'bg-green-100 text-green-800 border-green-300';
          case '予定': return 'bg-blue-100 text-blue-800 border-blue-300';
          default: return 'bg-gray-100 text-gray-600 border-gray-300';
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-800 pb-20">
          <div className="max-w-2xl mx-auto space-y-6">
            
            <header className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
              <div className="flex justify-between items-start">
                <div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <Calendar className="w-6 h-6 text-blue-500" />
                    予防接種スケジュール
                  </h1>
                  <p className="text-sm text-slate-500 mt-2">
                    {auth ? "自動保存オン・家族とリアルタイム同期可能" : "クラウド機能は現在オフラインです"}
                  </p>
                </div>
                {auth && (
                  <button 
                    onClick={() => setShowShareMenu(!showShareMenu)}
                    className={`p-2 rounded-full transition-colors ${showShareMenu ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                  >
                    <Users className="w-5 h-5" />
                  </button>
                )}
              </div>

              <div className="flex items-center gap-3 mt-2 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                <Baby className="w-6 h-6 text-indigo-500 flex-shrink-0" />
                <div className="flex-1 flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-indigo-900">
                  <div className="flex items-center gap-1">
                    <input 
                      type="text"
                      value={profile.name}
                      onChange={(e) => handleProfileChange('name', e.target.value)}
                      className="font-bold bg-white border border-indigo-200 rounded px-2 py-1 outline-none w-24 focus:ring-2 focus:ring-indigo-400"
                    />
                    <span className="font-semibold">の記録</span>
                  </div>
                  <div className="flex items-center gap-1">
                    <span className="text-xs text-indigo-700">お誕生日:</span>
                    <input 
                      type="date"
                      value={profile.birthDate}
                      onChange={(e) => handleProfileChange('birthDate', e.target.value)}
                      className="bg-white border border-indigo-200 rounded px-2 py-1 outline-none text-xs focus:ring-2 focus:ring-indigo-400"
                    />
                  </div>
                </div>
              </div>

              {showShareMenu && user && (
                <div className="bg-blue-50 rounded-xl p-4 border border-blue-100 space-y-4">
                  <h3 className="font-bold text-blue-900 flex items-center gap-2 text-sm border-b border-blue-200 pb-2">
                    <Users className="w-4 h-4" /> 家族と共有する
                  </h3>
                  <div className="space-y-1">
                    <p className="text-xs text-blue-700 font-semibold">あなたの共有コード（家族に教える）</p>
                    <div className="flex items-center gap-2">
                      <code className="flex-1 bg-white px-3 py-2 rounded border border-blue-200 text-xs overflow-x-auto text-slate-600 select-all">
                        {user.uid}
                      </code>
                      <button 
                        onClick={handleCopyCode}
                        className="bg-white p-2 border border-blue-200 rounded text-blue-600 hover:bg-blue-50 transition-colors"
                      >
                        {isCopied ? <Check className="w-4 h-4 text-green-500" /> : <Copy className="w-4 h-4" />}
                      </button>
                    </div>
                  </div>

                  <div className="space-y-1 pt-2">
                    <p className="text-xs text-blue-700 font-semibold">家族のコードを入力して同期する</p>
                    <div className="flex items-center gap-2">
                      <input
                        type="text"
                        value={inputCode}
                        onChange={(e) => setInputCode(e.target.value)}
                        placeholder="家族のコードをペースト"
                        className="flex-1 text-xs p-2 rounded border border-blue-200 outline-none focus:ring-2 focus:ring-blue-400"
                      />
                      <button 
                        onClick={applyShareCode}
                        disabled={!inputCode.trim()}
                        className="bg-blue-600 text-white px-3 py-2 rounded text-xs font-bold disabled:opacity-50 flex items-center gap-1"
                      >
                        同期 <ArrowRight className="w-3 h-3" />
                      </button>
                    </div>
                  </div>

                  {shareCode !== user.uid && (
                    <div className="mt-4 p-3 bg-white rounded border border-orange-200 text-sm">
                      <p className="text-orange-700 text-xs font-bold mb-2">
                        現在、家族のスケジュールを表示・同期中です
                      </p>
                      <button 
                        onClick={resetToMyCode}
                        className="text-xs bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-semibold hover:bg-orange-200"
                      >
                        自分のスケジュールに戻る
                      </button>
                    </div>
                  )}
                </div>
              )}
            </header>

            {isLoading && auth ? (
              <div className="flex justify-center p-10 text-slate-400">
                データを読み込み中...
              </div>
            ) : (
              <>
                <section className="bg-orange-50 p-5 rounded-2xl border border-orange-100 shadow-sm">
                  <h2 className="text-lg font-bold text-orange-800 mb-3 flex items-center gap-2">
                    <AlertCircle className="w-5 h-5" />
                    申請手続きメモ（付箋）
                  </h2>
                  <div className="space-y-2">
                    {todos.map((todo) => (
                      <div
                        key={todo.id}
                        onClick={() => toggleTodo(todo.id)}
                        className="flex items-center gap-3 p-2 hover:bg-orange-100/50 rounded-lg cursor-pointer transition-colors"
                      >
                        {todo.completed ? (
                          <CheckSquare className="w-6 h-6 text-orange-500 flex-shrink-0" />
                        ) : (
                          <Square className="w-6 h-6 text-orange-300 flex-shrink-0" />
                        )}
                        <span className={`${todo.completed ? 'text-orange-400 line-through' : 'text-orange-900'} text-sm md:text-base`}>
                          {todo.text}
                        </span>
                      </div>
                    ))}
                  </div>
                </section>

                <section className="space-y-4">
                  <h2 className="text-lg font-bold text-slate-700 px-2">接種スケジュール</h2>
                  
                  {vaccines.map((vaccine) => (
                    <div key={vaccine.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className={`px-4 py-3 border-b ${vaccine.theme}`}>
                        <h3 className="font-bold text-lg">{vaccine.name}</h3>
                      </div>
                      
                      <div className="p-4 space-y-4">
                        {vaccine.doses.map((dose) => (
                          <div key={dose.id} className="flex flex-col md:flex-row md:items-start gap-3 pb-4 border-b border-slate-100 last:border-0 last:pb-0">
                            
                            <div className="flex items-center justify-between md:flex-col md:items-start md:w-24 gap-2">
                              <span className="font-semibold text-slate-700">{dose.label}</span>
                              <select
                                value={dose.status}
                                onChange={(e) => handleDoseChange(vaccine.id, dose.id, 'status', e.target.value)}
                                className={`text-xs font-bold px-2 py-1 rounded-full border appearance-none text-center cursor-pointer outline-none ${getStatusColor(dose.status)}`}
                              >
                                <option value="未定">未定</option>
                                <option value="予定">予定</option>
                                <option value="完了">完了</option>
                              </select>
                            </div>

                            <div className="flex-1 space-y-2">
                              <div className="flex items-center gap-2 flex-wrap">
                                <input
                                  type="date"
                                  value={dose.date}
                                  onChange={(e) => handleDoseChange(vaccine.id, dose.id, 'date', e.target.value)}
                                  className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none w-full md:w-auto"
                                />
                                {dose.date && profile.birthDate && (
                                  <span className="text-xs font-bold text-indigo-700 bg-indigo-50 px-2.5 py-1 rounded-full whitespace-nowrap">
                                    {getAgeText(profile.birthDate, dose.date)}
                                  </span>
                                )}
                              </div>
                              
                              {dose.note && (
                                <div className="flex items-start gap-1.5 text-xs text-slate-500 bg-slate-50 p-2 rounded-md">
                                  <Info className="w-4 h-4 text-slate-400 flex-shrink-0 mt-0.5" />
                                  <p>{dose.note}</p>
                                </div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </section>
              </>
            )}
          </div>
        </div>
      );
    }

    // Reactアプリのマウント
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
